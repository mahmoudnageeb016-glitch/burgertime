var GSHEET_URL = "https://script.google.com/macros/s/AKfycbwrIAmWFSbSuqITKaE4TjKpCD1kv8bA-s6ILdxayuc4aZLQ9_LnLOYy1RmeRmbtw899/exec";

function gSend(payload) {
  if (!GSHEET_URL) return;
  try {
    var blob = new Blob([JSON.stringify(payload)], {type: "text/plain"});
    navigator.sendBeacon(GSHEET_URL, blob);
  } catch(e) {
    try {
      var x = new XMLHttpRequest();
      x.timeout = 8000;
      x.open("POST", GSHEET_URL, true);
      x.setRequestHeader("Content-Type", "text/plain");
      x.send(JSON.stringify(payload));
    } catch(e2) {}
  }
}

function syncNow() {
  var ordHdr = ["رقم الطلب","التاريخ","الوقت","نوع الطلب","الطاولة","الاصناف","الكمية","ملاحظات","الموظف","الحالة","الاجمالي CFA"];
  var ordRows = orders.map(function(o) {
    return [o.id, o.dateISO||o.date, o.time, o.orderType, o.tableNum,
      o.items.map(function(i){return i.name+(i.size&&i.size!=="قطعة"?" ("+i.size+")":"")+" x"+i.qty;}).join(", "),
      o.items.reduce(function(s,i){return s+i.qty;},0),
      o.note||"", o.placedBy||"", o.status, o.total];
  });

  var expHdr = ["التاريخ","النوع","الفئة","البند","اسم الموظف","المبلغ CFA","طريقة الدفع","اضافه","ملاحظات"];
  var expRows = expenses.map(function(e) {
    return [e.date, e.type==="admin"?"ثابت":"يومي", e.catLabel, e.item,
      e.employeeName||"", e.amount, e.pay, e.addedBy||"", e.notes||""];
  });

  var dM = {};
  orders.forEach(function(o) {
    var d = o.dateISO||o.date;
    if (!dM[d]) dM[d] = {n:0, rev:0, dE:0, fE:0};
    if (o.status !== "ملغي") { dM[d].n++; dM[d].rev += o.total; }
  });
  expenses.forEach(function(e) {
    if (!dM[e.date]) dM[e.date] = {n:0, rev:0, dE:0, fE:0};
    if (e.type === "daily") dM[e.date].dE += (+e.amount||0);
    else dM[e.date].fE += (+e.amount||0);
  });
  var dailyRows = Object.keys(dM).sort().reverse().map(function(d) {
    var v = dM[d];
    return [d, v.n, v.rev, v.dE, v.fE, v.rev - v.dE - v.fE];
  });

  gSend({type:"orders",   rows: ordRows});
  gSend({type:"expenses", rows: expRows});
  gSend({type:"daily",    rows: dailyRows});
}

  if(S.empPassVal===e.password){S.currentUser={id:e.id,name:e.name,role:"emp",perms:{...DEFAULT_PERMS,...(e.perms||{})}};S.screen="pos";S.view="pos";S.empPassErr="";notif("👋 أهلاً "+e.name+"!");}
  else{S.empPassErr="❌ كلمة المرور غلط";render();}
}
function logout(){S.currentUser=null;S.screen="login";S.loginStep="select";S.loginTarget=null;S.pinVal="";S.empPassVal="";S.cart=[];S.note="";S.tableNum="";S.search="";render();}

// ─── Cart ─────────────────────────────────────────────
function addToCart(item){
  const size=sel[item.id],price=item.prices[size],cartId=item.id+"-"+size;
  const ex=S.cart.find(c=>c.cartId===cartId);
  if(ex)S.cart=S.cart.map(c=>c.cartId===cartId?{...c,qty:c.qty+1}:c);
  else S.cart=[...S.cart,{...item,cartId,size,price,qty:1}];render();
}
function removeFromCart(cartId){
  const ex=S.cart.find(c=>c.cartId===cartId);
  if(ex&&ex.qty>1)S.cart=S.cart.map(c=>c.cartId===cartId?{...c,qty:c.qty-1}:c);
  else S.cart=S.cart.filter(c=>c.cartId!==cartId);render();
}
function clearCart(){S.cart=[];S.tableNum="";S.note="";render();}
function placeOrder(){
  if(!S.cart.length)return;
  const o={id:Date.now(),tableNum:S.tableNum||"—",orderType:S.orderType,
    items:[...S.cart],total:getTotal(),note:S.note,
    time:timeNow(),date:today(),dateISO:todayISO(),status:T('sNew'),
    placedBy:S.currentUser.name,placedById:S.currentUser.id};
  orders=[o,...orders];save("bt6_orders",orders);S.showConfirm=true;clearCart();autoSync();
}

          <button onclick="clearCart()" style="flex:0.4;padding:10px 0;border-radius:10px;border:2px solid #444;background:transparent;cursor:pointer;font-weight:700;font-size:13px;color:#888;">🗑️</button>
          <button onclick="placeOrder()" ${!S.cart.length?"disabled":""} style="flex:1;padding:10px 0;border-radius:10px;border:none;cursor:${S.cart.length?"pointer":"not-allowed"};background:${S.cart.length?"#f5a800":"#333"};color:${S.cart.length?"#1a1a1a":"#555"};font-weight:800;font-size:13px;">${T('confirmOrder')}</button>
        </div>
      </div>
    </div>
  </div>`;
}


function renderOrders(){
  const pendingReqs=getPendingReqs();
  const showRev=isAdmin()||hasPerm("viewRevenue");
  const visibleOrders=hasPerm("viewAllOrders")?orders:orders.filter(o=>o.placedById===S.currentUser.id);

  let html='<div style="padding:12px;overflow-y:auto;height:calc(100vh - 100px);">';

  // Stats
  html+=`<div style="display:grid;grid-template-columns:repeat(${showRev?3:2},1fr);gap:8px;margin-bottom:12px;">
    <div class="card" style="text-align:center;padding:10px;"><div style="font-size:18px;">📦</div><div style="font-weight:800;font-size:15px;color:#f5a800;">${getTodayO().length}</div><div style="color:#888;font-size:10px;">طلبات اليوم</div></div>
    ${showRev?`<div class="card" style="text-align:center;padding:10px;border-color:#2d9e5a;"><div style="font-size:18px;">💰</div><div style="font-weight:800;font-size:14px;color:#2d9e5a;">${fmt(getRevenue())}</div><div style="color:#888;font-size:10px;">إيرادات اليوم</div></div>`:''}
    <div class="card" style="text-align:center;padding:10px;"><div style="font-size:18px;">⏳</div><div style="font-weight:800;font-size:15px;color:#f5a800;">${getPending()}</div><div style="color:#888;font-size:10px;">في الانتظار</div></div>
  </div>`;

  // طلبات تحتاج موافقة
  if(isAdmin()&&pendingReqs.length){
    html+=`<div style="background:#1a0e00;border:2px solid #f5a800;border-radius:12px;padding:12px;margin-bottom:12px;">
      <div style="font-weight:800;color:#f5a800;font-size:13px;margin-bottom:8px;">⚠️ تحتاج موافقتك (${pendingReqs.length})</div>`;
    pendingReqs.forEach(req=>{
      const o=orders.find(x=>x.id===req.orderId);
      if(!o)return;
      html+=`<div style="background:#111;border-radius:8px;padding:9px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:7px;">
        <div>
          <div style="font-size:11px;color:#f5a800;font-weight:700;">${req.type==="delete"?"🗑️ حذف":"❌ إلغاء"} — ${req.by}</div>
          <div style="font-size:12px;font-weight:700;margin-top:2px;">${o.orderType==="على الطاولة"?"🪑 طاولة "+o.tableNum:o.orderType==="تيك أواي"?"🥡 تيك أواي":"🛵 ديلفري"} — ${fmt(o.total)}</div>
        </div>
        <div style="display:flex;gap:6px;">
          <button onclick="approveReq(${req.orderId},'${req.type}')" style="padding:6px 12px;border-radius:8px;border:none;background:#2d9e5a;color:#fff;cursor:pointer;font-family:Cairo,sans-serif;font-weight:700;font-size:12px;">✅</button>
          <button onclick="rejectReq(${req.orderId},'${req.type}')" style="padding:6px 12px;border-radius:8px;border:none;background:#c0391b;color:#fff;cursor:pointer;font-family:Cairo,sans-serif;font-weight:700;font-size:12px;">❌</button>
        </div>
      </div>`;
    });
    html+='</div>';
  }

  if(!visibleOrders.length){
    html+='<div style="text-align:center;color:#555;padding:44px;background:#2a2a2a;border-radius:16px;"><div style="font-size:44px;">📋</div><div style="margin-top:10px;font-size:13px;">لا توجد طلبات</div></div>';
  }

  // كل طلب
  const ST2={T("sNew"):{bg:"#2a1a00",border:"#f5a800",color:"#f5a800",icon:"🆕"},[T("sProg")]:{bg:"#001a2a",border:"#1a8fe0",color:"#1a8fe0",icon:"🔥"},[T("sDone")]:{bg:"#001a0a",border:"#2d9e5a",color:"#2d9e5a",icon:"✅"},[T("sCanc")]:{bg:"#1a0000",border:"#c0391b",color:"#c0391b",icon:"❌"}};
  const SF=["جديد","قيد التنفيذ","مكتمل"];

  visibleOrders.forEach(order=>{
    const st=ST2[order.status]||ST2["جديد"];
    const done=order.status===T('sDone')||order.status===T('sCanc');
    const next=SF[SF.indexOf(order.status)+1];
    const myDel=delReqs.find(r=>r.orderId===order.id&&r.status==="pending");
    const showAmt=showRev||order.placedById===S.currentUser.id;

    html+=`<div style="background:#2a2a2a;border-radius:12px;border:1.5px solid ${myDel?"#f5a800":"#333"};margin-bottom:9px;overflow:hidden;">
      <div style="padding:9px 12px;background:#1e1e1e;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <span style="font-weight:800;font-size:13px;">${order.orderType===T("onTable")||order.orderType==="على الطاولة"?"🪑 "+order.tableNum:order.orderType===T("takeaway")||order.orderType==="تيك أواي"?"🥡 "+T("takeaway"):"🛵 "+T("delivery")}</span>
          <span style="color:#555;font-size:11px;">${order.time}</span>
          <span style="font-size:10px;color:#444;background:#2a2a2a;border-radius:5px;padding:1px 6px;">👤 ${order.placedBy}</span>
        </div>
        ${showAmt?`<span style="font-weight:800;color:#f5a800;font-size:14px;">${fmt(order.total)}</span>`:''}
      </div>
      <div style="padding:7px 12px;display:flex;flex-wrap:wrap;gap:5px;border-bottom:1px solid #222;">
        ${order.items.map(i=>`<span style="background:#1a1a1a;border-radius:6px;padding:2px 7px;font-size:11px;border:1px solid #333;">${i.emoji} ${i.name}${i.size&&i.size!=="قطعة"?" ("+i.size+")":""} ×${i.qty}</span>`).join('')}
        ${order.note?`<span style="background:#2e2800;border-radius:6px;padding:2px 7px;font-size:11px;color:#aaa;border:1px solid #4a3a00;">📝 ${order.note}</span>`:''}
      </div>
      <div style="padding:9px 12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:7px;">
        <div style="background:${st.bg};border:2px solid ${st.border};border-radius:8px;padding:4px 10px;display:inline-flex;align-items:center;gap:5px;">
          <span style="font-size:13px;">${st.icon}</span>
          <span style="font-weight:800;font-size:12px;color:${st.color};">${order.status}</span>
        </div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;">
          ${!done&&next?`<button onclick="nextStatus(${order.id})" style="padding:5px 10px;border-radius:7px;background:${ST2[next].bg};border:2px solid ${ST2[next].border};color:${ST2[next].color};cursor:pointer;font-family:Cairo,sans-serif;font-weight:800;font-size:11px;">${ST2[next].icon} ${next}</button>`:''}
          ${isAdmin()&&!done?`<button onclick="adminCancel(${order.id})" style="padding:5px 8px;border-radius:7px;border:1.5px solid #5a2020;background:#2a1010;cursor:pointer;font-family:Cairo,sans-serif;font-weight:700;font-size:11px;color:#e55;">❌</button><button onclick="adminDelete(${order.id})" style="padding:5px 8px;border-radius:7px;border:1.5px solid #3a0000;background:#1a0000;cursor:pointer;font-family:Cairo,sans-serif;font-weight:700;font-size:11px;color:#a00;">🗑️</button>`:''}
          ${!isAdmin()&&!done?myDel?`<span style="color:#f5a800;font-size:11px;padding:4px 8px;border-radius:6px;background:#2a1a00;border:1px solid #4a3a00;">⏳ انتظار</span>`:`<button onclick="requestCancel(${order.id})" style="padding:4px 8px;border-radius:6px;border:1px solid #4a2020;background:#1a0a0a;cursor:pointer;font-family:Cairo,sans-serif;font-weight:700;font-size:11px;color:#c55;">❌</button><button onclick="requestDelete(${order.id})" style="padding:4px 8px;border-radius:6px;border:1px solid #4a3a00;background:#1a1000;cursor:pointer;font-family:Cairo,sans-serif;font-weight:700;font-size:11px;color:#a87;">🗑️</button>`:''}
        </div>
      </div>
    </div>`;
  });

  html+='</div>';
  return html;
}


function renderExpenses(){
  const canAdd=hasPerm("addExpenses");
  const canView=hasPerm("viewExpenses");
  if(!isAdmin()&&!canAdd&&!canView)return`<div style="display:flex;align-items:center;justify-content:center;height:calc(100vh - 100px);"><div style="text-align:center;color:#555;"><div style="font-size:52px;margin-bottom:12px;">🔒</div><div style="font-size:14px;">ليس لديك صلاحية المصروفات</div></div></div>`;

  // Only admin sees admin tab
  const showAdminTab=isAdmin();
  const activeTab=showAdminTab?S.expTab:"daily";

  // Summary cards
  const adminTotal=totalExp("admin");
  const dailyTotal=totalExp("daily");
  const netProfit=totalRevenue()-adminTotal-dailyTotal;

  // Filtered list
  let listExp=[];
  if(isAdmin()){
    listExp=expenses.filter(e=>e.type===activeTab);
  } else {
    listExp=expenses.filter(e=>e.type==="daily");
  }
  const expByDate={};
  listExp.forEach(e=>{if(!expByDate[e.date])expByDate[e.date]=[];expByDate[e.date].push(e);});
  const sortedDates=Object.keys(expByDate).sort().reverse();

  const af=S.adminExpForm, df=S.dailyExpForm;
  const selAdminCat=ADMIN_EXP_CATS.find(c=>c.id===af.catId)||ADMIN_EXP_CATS[0];

  return`<div style="padding:13px;overflow-y:auto;height:calc(100vh - 100px);">

    <!-- ملخص أرقام -->
    <div style="display:grid;grid-template-columns:repeat(${isAdmin()?4:2},1fr);gap:9px;margin-bottom:14px;">
      ${isAdmin()?`
      <div class="card" style="text-align:center;border-color:#7b3fa0;"><div style="font-size:18px;">👷</div><div style="font-weight:800;font-size:13px;color:#a55fd0;">${fmt(adminTotal)}</div><div style="color:#888;font-size:10px;">رواتب وثابت</div></div>
      <div class="card" style="text-align:center;border-color:#c0391b;"><div style="font-size:18px;">🥩</div><div style="font-weight:800;font-size:13px;color:#c0391b;">${fmt(dailyTotal)}</div><div style="color:#888;font-size:10px;">مصروفات يومية</div></div>
      <div class="card" style="text-align:center;border-color:#f5a800;"><div style="font-size:18px;">💸</div><div style="font-weight:800;font-size:13px;color:#f5a800;">${fmt(adminTotal+dailyTotal)}</div><div style="color:#888;font-size:10px;">إجمالي المصروفات</div></div>
      <div class="card" style="text-align:center;border-color:#2d9e5a;"><div style="font-size:18px;">📊</div><div style="font-weight:800;font-size:13px;color:#2d9e5a;">${fmt(netProfit)}</div><div style="color:#888;font-size:10px;">صافي الربح</div></div>
      `:`
      <div class="card" style="text-align:center;border-color:#c0391b;"><div style="font-size:20px;">💸</div><div style="font-weight:800;font-size:14px;color:#c0391b;">${fmt(todayExp("daily"))}</div><div style="color:#888;font-size:11px;">مصروفات اليوم</div></div>
      <div class="card" style="text-align:center;border-color:#f5a800;"><div style="font-size:20px;">📅</div><div style="font-weight:800;font-size:14px;color:#f5a800;">${fmt(dailyTotal)}</div><div style="color:#888;font-size:11px;">إجمالي اليومية</div></div>
      `}
    </div>

    <!-- تابات: أدمن فقط يشوف الاثنين -->
    ${showAdminTab?`
    <div style="display:flex;gap:8px;margin-bottom:14px;">
      <button class="exp-tab" onclick="S.expTab='admin';render()" style="flex:1;border-color:#7b3fa0;background:${activeTab==='admin'?'#7b3fa0':'transparent'};color:${activeTab==='admin'?'#fff':'#a55fd0'};">
        👑 مصروفات الأدمن<br><span style="font-size:10px;font-weight:400;">رواتب · إيجار · كهرباء · صيانة</span>
      </button>
      <button class="exp-tab" onclick="S.expTab='daily';render()" style="flex:1;border-color:#c0391b;background:${activeTab==='daily'?'#c0391b':'transparent'};color:${activeTab==='daily'?'#fff':'#c0391b'};">
        📦 مصروفات يومية<br><span style="font-size:10px;font-weight:400;">مواد خام · بنزين · عبوات</span>
      </button>
    </div>`:""}

    <!-- ═══ فورم مصروفات الأدمن ═══ -->
    ${isAdmin()&&activeTab==="admin"?`
    <div style="background:#1a001a;border:2px solid #7b3fa0;border-radius:14px;padding:15px;margin-bottom:14px;">
      <div style="font-weight:800;font-size:14px;color:#a55fd0;margin-bottom:12px;">👑 تسجيل مصروف ثابت</div>
      
      <!-- اختيار الفئة - أزرار كبيرة -->
      <div style="margin-bottom:12px;">
        <div style="font-size:11px;color:#888;margin-bottom:6px;">نوع المصروف</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px;">
          ${ADMIN_EXP_CATS.map(cat=>`
            <button onclick="S.adminExpForm.catId='${cat.id}';render()" style="padding:8px 6px;border-radius:9px;border:2px solid ${af.catId===cat.id?'#7b3fa0':'#333'};background:${af.catId===cat.id?'#2a0a2a':'#1a1a1a'};cursor:pointer;font-family:Cairo,sans-serif;font-size:11px;font-weight:700;color:${af.catId===cat.id?'#a55fd0':'#888'};text-align:center;">
              <div style="font-size:18px;margin-bottom:3px;">${cat.icon}</div>
              ${cat.label.replace(/^[^ ]+ /,"")}
            </button>
          `).join("")}
        </div>
      </div>

      <!-- اسم الموظف — فقط لو Salary -->
      ${selAdminCat.hasSalaryPicker?`
      <div style="margin-bottom:10px;">
        <div style="font-size:11px;color:#888;margin-bottom:5px;">👷 اختر الموظف</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;">
          ${employees.filter(e=>e.active).map(e=>`
            <button onclick="S.adminExpForm.employeeName='${e.name}';render()" style="padding:7px 14px;border-radius:9px;border:2px solid ${af.employeeName===e.name?'#f5a800':'#444'};background:${af.employeeName===e.name?'#2a1a00':'#1a1a1a'};cursor:pointer;font-family:Cairo,sans-serif;font-size:12px;font-weight:700;color:${af.employeeName===e.name?'#f5a800':'#888'};">
              👤 ${e.name}
            </button>
          `).join("")}
        </div>
        ${af.employeeName?`<div style="font-size:11px;color:#f5a800;font-weight:700;">✓ تم اختيار: ${af.employeeName}</div>`:""}
      </div>`:""}

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
        <div><div style="font-size:11px;color:#888;margin-bottom:4px;">التاريخ</div><input class="inp" type="date" value="${af.date}" oninput="S.adminExpForm.date=this.value"></div>
        <div><div style="font-size:11px;color:#888;margin-bottom:4px;">المبلغ (${CURRENCY}) *</div><input class="inp" type="number" placeholder="0" value="${af.amount}" oninput="S.adminExpForm.amount=this.value" style="font-size:14px;font-weight:700;"></div>
        <div><div style="font-size:11px;color:#888;margin-bottom:4px;">طريقة الدفع</div><select class="inp" onchange="S.adminExpForm.pay=this.value">${["كاش","تحويل","بطاقة","شيك"].map(p=>`<option ${af.pay===p?"selected":""}>${p}</option>`).join("")}</select></div>
        <div><div style="font-size:11px;color:#888;margin-bottom:4px;">ملاحظات</div><input class="inp" placeholder="اختياري" value="${af.notes}" oninput="S.adminExpForm.notes=this.value"></div>
      </div>
      ${S.adminExpErr?`<div style="color:#c0391b;font-size:12px;margin-bottom:8px;font-weight:700;">${S.adminExpErr}</div>`:""}
      <button onclick="saveAdminExp()" style="width:100%;padding:11px 0;border-radius:10px;border:none;background:#7b3fa0;color:#fff;font-family:Cairo,sans-serif;font-weight:800;font-size:14px;cursor:pointer;">💾 تسجيل المصروف</button>
    </div>`:""}

    <!-- ═══ فورم مصروفات يومية ═══ -->
    ${activeTab==="daily"&&(isAdmin()||canAdd)?`
    <div style="background:#1a0000;border:2px solid #c0391b;border-radius:14px;padding:15px;margin-bottom:14px;">
      <div style="font-weight:800;font-size:14px;color:#e06050;margin-bottom:12px;">📦 تسجيل مصروف يومي</div>
      
      <!-- اختيار الفئة اليومية -->
      <div style="margin-bottom:12px;">
        <div style="font-size:11px;color:#888;margin-bottom:6px;">نوع المصروف اليومي</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;">
          ${DAILY_EXP_CATS.map(cat=>`
            <button onclick="S.dailyExpForm.catId='${cat.id}';render()" style="padding:8px 6px;border-radius:9px;border:2px solid ${df.catId===cat.id?'#c0391b':'#333'};background:${df.catId===cat.id?'#2a0a00':'#1a1a1a'};cursor:pointer;font-family:Cairo,sans-serif;font-size:11px;font-weight:700;color:${df.catId===cat.id?'#e06050':'#888'};text-align:center;">
              <div style="font-size:18px;margin-bottom:3px;">${cat.icon}</div>
              ${cat.label.replace(/^[^ ]+ /,"")}
            </button>
          `).join("")}
        </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">

      ${S.dailyExpErr?`<div style="color:#c0391b;font-size:12px;margin-bottom:8px;font-weight:700;">${S.dailyExpErr}</div>`:""}

    ${sortedDates.map(date=>{
      const dayExps=expByDate[date];
      const dayTotal=dayExps.reduce((s,e)=>s+(+e.amount||0),0);
      const borderClr=activeTab==="admin"?"#7b3fa0":"#c0391b";
      const totalClr=activeTab==="admin"?"#a55fd0":"#c0391b";
      return`<div style="background:#2a2a2a;border-radius:12px;border:1px solid #333;margin-bottom:10px;overflow:hidden;">
        <div style="padding:9px 13px;background:#1e1e1e;border-bottom:1px solid #333;display:flex;align-items:center;justify-content:space-between;">
          <span style="font-weight:700;font-size:13px;color:#ccc;">📅 ${date}</span>
          <span style="font-weight:800;font-size:13px;color:${totalClr};">${fmt(dayTotal)}</span>
        </div>
        ${dayExps.map(e=>`<div style="padding:9px 13px;border-bottom:1px solid #222;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
          <div>
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px;">
              <span style="font-size:15px;">${[...ADMIN_EXP_CATS,...DAILY_EXP_CATS].find(c=>c.id===e.catId)?.icon||"📌"}</span>
              <span style="font-weight:700;font-size:13px;">${e.item}</span>
              ${e.employeeName?`<span style="background:#2a1a00;border:1px solid #f5a800;border-radius:6px;padding:1px 7px;font-size:10px;color:#f5a800;">👤 ${e.employeeName}</span>`:""}
            </div>
            <div style="font-size:10px;color:#555;margin-right:21px;">${e.catLabel} · ${e.pay} · ${e.addedBy||"—"}${e.notes?" · "+e.notes:""}</div>
          </div>
          <div style="display:flex;align-items:center;gap:9px;">
            <span style="font-weight:800;color:${totalClr};font-size:14px;">${fmt(e.amount)}</span>
            ${isAdmin()?`<button onclick="deleteExpense(${e.id})" style="background:#3a1010;border:1px solid #5a2020;border-radius:6px;color:#e55;cursor:pointer;padding:4px 9px;font-size:11px;font-family:Cairo,sans-serif;">🗑️</button>`:""}
          </div>
        </div>`).join("")}
      </div>`;
    }).join("")}
  </div>`;
}

function renderEmployees(){
  const f=S.empForm;
  return`<div style="padding:14px;overflow-y:auto;height:calc(100vh - 100px);">
    <!-- فورم -->
    <div style="background:#1e1e1e;border:2px solid ${f.name?'#f5a800':'#333'};border-radius:14px;padding:15px;margin-bottom:16px;">
      <div style="font-weight:800;font-size:14px;color:#f5a800;margin-bottom:12px;">${f.id?"✏️ تعديل بيانات الموظف":"➕ إضافة موظف جديد"}</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;">
        <div style="flex:1;min-width:140px;"><div style="font-size:11px;color:#888;margin-bottom:4px;">اسم الموظف</div><input class="inp" placeholder="مثال: أحمد" value="${f.name}" oninput="S.empForm.name=this.value"></div>
        <div style="flex:1;min-width:140px;"><div style="font-size:11px;color:#888;margin-bottom:4px;">كلمة المرور</div><input class="inp" placeholder="مثال: 1234" value="${f.password}" oninput="S.empForm.password=this.value" type="text" inputmode="numeric"></div>
      </div>
      <div style="background:#111;border-radius:10px;padding:12px;margin-bottom:12px;">
        <div style="font-weight:700;font-size:12px;color:#f5a800;margin-bottom:10px;">🔐 صلاحيات الموظف</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          ${Object.entries(PERMS_DEF).map(([key,label])=>`
            <label style="display:flex;align-items:center;gap:8px;cursor:pointer;padding:8px 10px;border-radius:8px;border:1.5px solid ${f.perms[key]?'#f5a800':'#333'};background:${f.perms[key]?'#2a1a00':'#1a1a1a'};">
              <input type="checkbox" class="perm-check" ${f.perms[key]?"checked":""} onchange="togglePerm('${key}')">
              <div>
                <div style="font-size:12px;font-weight:600;color:${f.perms[key]?'#f5a800':'#888'};">${label}</div>
                ${key==="addExpenses"?`<div style="font-size:10px;color:#555;margin-top:1px;">مواد خام · بنزين · متفرقات</div>`:""}
              </div>
            </label>
          `).join("")}
        </div>
      </div>
      ${S.empFormErr?`<div style="color:#c0391b;font-size:12px;margin-bottom:8px;font-weight:700;">${S.empFormErr}</div>`:""}
      <div style="display:flex;gap:8px;">
        <button onclick="S.empForm={id:null,name:'',password:'',perms:{...DEFAULT_PERMS}};S.empFormErr='';render()" class="btn-dark" style="font-size:12px;padding:8px 14px;">مسح</button>
        <button onclick="saveEmp()" class="btn-gold" style="font-size:12px;padding:8px 20px;">${f.id?"💾 حفظ التعديل":"➕ إضافة موظف"}</button>
      </div>
    </div>

    ${employees.length===0?`<div style="text-align:center;color:#555;padding:28px;font-size:13px;">لا يوجد موظفين</div>`:""}
    ${employees.map(e=>{
      const permsActive=Object.entries(e.perms||{}).filter(([,v])=>v).map(([k])=>PERMS_DEF[k]);
      return`<div class="card" style="margin-bottom:10px;border-color:${e.active?"#333":"#2a1010"};">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;">
          <div style="display:flex;align-items:center;gap:11px;">
            <div style="width:40px;height:40px;border-radius:50%;background:${e.active?"#2a2800":"#2a1010"};border:2px solid ${e.active?"#f5a800":"#5a2020"};display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;">${e.active?"👤":"🚫"}</div>
            <div>
              <div style="font-weight:700;font-size:14px;color:${e.active?"#fff":"#555"};">${e.name}</div>
              <div style="font-size:11px;color:#555;">كلمة المرور: <b style="color:#777;">${e.password}</b> · ${e.active?"🟢 مفعّل":"🔴 موقوف"}</div>
              <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;">
                ${permsActive.length?permsActive.map(p=>`<span style="background:#2a1a00;border:1px solid #f5a800;border-radius:5px;padding:1px 7px;font-size:10px;color:#f5a800;">${p}</span>`).join(""):`<span style="font-size:10px;color:#444;">بدون صلاحيات إضافية</span>`}
              </div>
            </div>
          </div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;">
            <button onclick="openEmpForm(${JSON.stringify(e).replace(/"/g,'&quot;')})" style="padding:6px 11px;border-radius:8px;border:1.5px solid #444;background:transparent;cursor:pointer;font-family:Cairo,sans-serif;font-size:11px;color:#aaa;">✏️ تعديل</button>
            <button onclick="toggleEmp(${e.id})" style="padding:6px 11px;border-radius:8px;border:1.5px solid ${e.active?"#5a2020":"#2a4a20"};background:${e.active?"#1a0a0a":"#0a1a0a"};cursor:pointer;font-family:Cairo,sans-serif;font-size:11px;color:${e.active?"#e55":"#5c5"};">${e.active?"إيقاف":"تفعيل"}</button>
            <button onclick="deleteEmp(${e.id})" style="padding:6px 11px;border-radius:8px;border:1.5px solid #3a0000;background:#1a0000;cursor:pointer;font-family:Cairo,sans-serif;font-size:11px;color:#a00;">🗑️</button>
          </div>
        </div>
      </div>`;
    }).join("")}
  </div>`;
}


function render(){
  if(S.screen==="login"){document.getElementById("app").innerHTML=renderLogin();return;}
  const pendingCount=getPendingReqs().length;
  const canSeeExp=isAdmin()||hasPerm("viewExpenses")||hasPerm("addExpenses");
  document.getElementById("app").innerHTML=`
    <div style="background:#111;padding:9px 13px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:7px;border-bottom:2px solid #f5a800;">
      <div style="display:flex;align-items:center;gap:9px;">
        <div style="background:#f5a800;border-radius:9px;padding:5px 9px;font-size:18px;">⏱️</div>
        <div><div style="font-weight:800;font-size:14px;color:#f5a800;letter-spacing:1px;">BURGER TIME</div>
        <div style="font-size:9px;color:#555;">${new Date().toLocaleDateString("ar-DZ",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}</div></div>
      </div>
      <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:7px;background:#2a2a2a;border-radius:9px;padding:6px 11px;border:1.5px solid ${isAdmin()?'#f5a800':'#3a3a3a'};">
          <span>${isAdmin()?"👑":"👤"}</span>
          <span style="font-weight:700;font-size:12px;color:${isAdmin()?'#f5a800':'#fff'};">${S.currentUser.name}</span>
          <button onclick="logout()" style="background:transparent;border:none;color:#555;cursor:pointer;font-size:10px;font-family:Cairo,sans-serif;">${T('logout')}</button>
        </div>
        <button class="tab-btn" onclick="S.view='pos';render()" style="background:${S.view==="pos"?"#f5a800":"transparent"};color:${S.view==="pos"?"#1a1a1a":"#f5a800"};">${T('cashier')}</button>
        <button class="tab-btn" onclick="S.view='orders';render()" style="background:${S.view==="orders"?"#f5a800":"transparent"};color:${S.view==="orders"?"#1a1a1a":"#f5a800"};position:relative;">
          📋 الطلبات${isAdmin()&&pendingCount?`<span style="position:absolute;top:-7px;left:-7px;background:#c0391b;color:#fff;border-radius:20px;width:17px;height:17px;font-size:9px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;">${pendingCount}</span>`:""}
        </button>
        ${canSeeExp?`<button class="tab-btn" onclick="S.view='expenses';render()" style="background:${S.view==="expenses"?"#c0391b":"transparent"};color:${S.view==="expenses"?"#fff":"#c0391b"};border-color:#c0391b;">${T('expenses')}</button>`:""}
        ${isAdmin()?`<button class="tab-btn" onclick="S.view='employees';openEmpForm(null)" style="background:${S.view==="employees"?"#f5a800":"transparent"};color:${S.view==="employees"?"#1a1a1a":"#f5a800"};">${T('employees')}</button>
`:""}
      </div>
    </div>
    <div style="background:#0d0d0d;padding:5px 13px;display:flex;gap:16px;font-size:11px;color:#444;flex-wrap:wrap;border-bottom:1px solid #1e1e1e;">
      <span>📦 اليوم: <b style="color:#f5a800;">${getTodayO().length}</b></span>
      ${isAdmin()||hasPerm("viewRevenue")?`<span>💰 الإيرادات: <b style="color:#2d9e5a;">${fmt(getRevenue())}</b></span>`:""}
      ${isAdmin()?`<span>👑 ثابت: <b style="color:#a55fd0;">${fmt(todayExp("admin"))}</b></span><span>📦 يومي: <b style="color:#c0391b;">${fmt(todayExp("daily"))}</b></span>`:""}
      <span>⏳ انتظار: <b style="color:#f5a800;">${getPending()}</b></span>
      
    </div>
    ${S.view==="pos"?renderPOS():S.view==="orders"?renderOrders():S.view==="expenses"?renderExpenses():renderEmployees()}

    ${S.showConfirm?`<div class="overlay" onclick="if(event.target===this){S.showConfirm=false;render();}">
      <div style="background:#1e1e1e;border:2px solid #f5a800;border-radius:16px;padding:26px;text-align:center;max-width:280px;">
        <div style="font-size:48px;margin-bottom:10px;">✅</div>
        <div style="font-weight:800;font-size:16px;color:#f5a800;margin-bottom:6px;">${T('orderDone')}</div>
        <div style="color:#666;font-size:12px;margin-bottom:16px;">${T('followOrders')}</div>
        <div style="display:flex;gap:8px;">
          <button onclick="S.showConfirm=false;S.view='orders';render()" style="flex:1;padding:9px 0;border-radius:10px;border:2px solid #333;background:transparent;color:#aaa;font-family:Cairo,sans-serif;font-weight:700;font-size:12px;cursor:pointer;">📋 الطلبات</button>
          <button onclick="S.showConfirm=false;render()" style="flex:1.5;padding:9px 0;border-radius:10px;border:none;background:#f5a800;color:#1a1a1a;font-family:Cairo,sans-serif;font-weight:800;font-size:13px;cursor:pointer;">${T('newOrder')}</button>
        </div>
      </div>
    </div>`:""}


    ${S.notif?`<div class="notif" style="border:2px solid ${S.notif.color};color:${S.notif.color};">${S.notif.msg}</div>`:""}
  `;
}
render();
</script>
</body>
</html>
